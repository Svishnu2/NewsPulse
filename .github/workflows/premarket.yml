name: premarket

on:
  schedule:
    - cron: "30 2 * * 1-5" # 08:00 IST (GitHub cron may start 5-20 min late)
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass holiday / late-start guards (testing)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: newspulse-data
  cancel-in-progress: false

jobs:
  premarket:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run pre-market job
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-flash-latest' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}
        run: python -m src.jobs.premarket
# registered
