name: verify

on:
  schedule:
    - cron: "30 10 * * 1-5" # 16:00 IST; lateness harmless (market already closed)
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass holiday guard (testing)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: newspulse-data
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run verify job
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}
        run: python -m src.jobs.verify
# registered
