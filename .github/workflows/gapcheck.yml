name: gapcheck

on:
  schedule:
    - cron: "5 4 * * 1-5" # 09:35 IST; lateness harmless (only needs pre-09:35 data)
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass holiday guard (testing)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: newspulse-data
  cancel-in-progress: false

jobs:
  gapcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run gap-check job
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}
        run: python -m src.jobs.gapcheck
# registered
